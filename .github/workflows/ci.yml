name: Moodle Plugin CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [8.1, 8.2]
        moodle-branch: [MOODLE_404_STABLE, MOODLE_405_STABLE]
        db: [pgsql, mysqli]

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, mbstring, xml, curl, zip, gd, pdo, pgsql, mysqli
          coverage: none

      - name: Install moodle-plugin-ci
        run: |
          composer create-project --no-dev moodlehq/moodle-plugin-ci ci ^4
          echo "$(pwd)/ci/bin" >> $GITHUB_PATH
          echo "$(pwd)/ci/vendor/bin" >> $GITHUB_PATH

      - name: Install Moodle + plugin
        run: |
          moodle-plugin-ci install \
            --plugin local_examnotice \
            --moodle ${{ matrix.moodle-branch }} \
            --db ${{ matrix.db }}

      - name: PHP Lint
        run: moodle-plugin-ci phplint

      - name: Validate plugin
        run: moodle-plugin-ci validate

      - name: Moodle Code Checker
        run: moodle-plugin-ci codechecker

      - name: PHP Mess Detector
        run: moodle-plugin-ci phpmd

      - name: PHP Copy/Paste Detector
        run: moodle-plugin-ci phpcpd

      - name: JS Lint (AMD)
        run: moodle-plugin-ci jshint

      - name: AMD build validation
        run: moodle-plugin-ci shifter

      - name: Mustache templates validation
        run: moodle-plugin-ci mustache

      - name: PHPUnit (optional)
        run: moodle-plugin-ci phpunit
