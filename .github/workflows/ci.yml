language: php

dist: focal

cache:
  directories:
    - $HOME/.composer/cache

php:
  - 8.1
  - 8.2

env:
  matrix:
    - DB=pgsql MOODLE_BRANCH=MOODLE_404_STABLE
    - DB=mysqli MOODLE_BRANCH=MOODLE_404_STABLE
    - DB=pgsql MOODLE_BRANCH=MOODLE_405_STABLE
    - DB=mysqli MOODLE_BRANCH=MOODLE_405_STABLE

before_install:
  - phpenv config-rm xdebug.ini || true
  - cd ../..
  - composer self-update

  # Install Moodle Plugin CI (latest version)
  - composer create-project -n --no-dev moodlehq/moodle-plugin-ci ci ^4

  - export PATH="$(cd ci/bin; pwd):$(cd ci/vendor/bin; pwd):$PATH"

install:
  - moodle-plugin-ci install --plugin local_examnotice

script:
  # Core checks (important for Moodle approval)
  - moodle-plugin-ci phplint
  - moodle-plugin-ci validate
  - moodle-plugin-ci codechecker

  # Recommended checks
  - moodle-plugin-ci phpmd
  - moodle-plugin-ci phpcpd

  # Frontend checks (important for your AMD modal)
  - moodle-plugin-ci jshint
  - moodle-plugin-ci shifter

  # PHPUnit (even if minimal)
  - moodle-plugin-ci phpunit

# Optional: disable failing on less critical checks
matrix:
  fast_finish: true
