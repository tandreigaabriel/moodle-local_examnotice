name: Moodle Plugin CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2']
        moodle-branch: ['MOODLE_404_STABLE', 'MOODLE_405_STABLE']

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: ''
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, xml, curl, zip, gd, mysqli
          coverage: none

      - name: Install Node (for AMD build checks)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install moodle-plugin-ci
        run: |
          composer create-project --no-dev moodlehq/moodle-plugin-ci ci ^4
          echo "$(cd ci/bin; pwd)" >> $GITHUB_PATH
          echo "$(cd ci/vendor/bin; pwd)" >> $GITHUB_PATH

      - name: Install Moodle + plugin
        run: |
          moodle-plugin-ci install \
            --plugin ./plugin \
            --moodle ${{ matrix.moodle-branch }} \
            --db-type mysqli \
            --db-host 127.0.0.1

      #  CORE CHECKS (REQUIRED FOR APPROVAL)
      - name: PHP Lint
        run: moodle-plugin-ci phplint

      - name: Validate plugin
        run: moodle-plugin-ci validate

      - name: Moodle Code Checker
        run: moodle-plugin-ci codechecker -- --exclude=amd/build

      #  QUALITY CHECKS
      - name: PHP Mess Detector
        run: moodle-plugin-ci phpmd

      - name: PHP Copy Paste Detector
        run: moodle-plugin-ci phpcpd

      #  FRONTEND (IMPORTANT FOR YOUR MODAL)
      - name: JS Lint
        run: moodle-plugin-ci jshint

      - name: AMD build validation
        run: moodle-plugin-ci shifter

      - name: Mustache validation
        run: moodle-plugin-ci mustache

      #  OPTIONAL
      - name: PHPUnit
        run: moodle-plugin-ci phpunit
